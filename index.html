*{box-sizing:border-box;}
body{
  margin:0; background:var(--paper); color:var(--ink);
  font-family:'Inter',sans-serif; font-size:15px; line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3{font-family:'Space Grotesk',sans-serif; font-weight:700; margin:0 0 .3em; letter-spacing:-.01em;}
.mono{font-family:'IBM Plex Mono',monospace;}
.app{max-width:920px; margin:0 auto; padding:16px; padding-bottom:56px;}

.hero-banner{
  position:relative; margin:-16px -16px 0; height:150px;
  background-image:linear-gradient(180deg, rgba(20,22,43,.15) 0%, rgba(20,22,43,.75) 100%), var(--hero-img);
  background-size:cover; background-position:center 60%;
  display:flex; align-items:flex-end; padding:16px 18px;
}
.hero-banner h1{
  color:#fff; font-size:21px; font-weight:700; margin:0; letter-spacing:-.01em;
  text-shadow:0 2px 10px rgba(0,0,0,.35); line-height:1.25;
}
.hero-banner small{color:rgba(255,255,255,.85); font-size:11.5px; font-weight:500;}
.topbar{
  display:flex; justify-content:flex-end; align-items:center; gap:10px; flex-wrap:wrap;
  padding:10px 18px; margin:0 -16px 16px;
  background:rgba(255,255,255,.92); backdrop-filter:blur(8px);
  border-bottom:1px solid var(--rule);
  position:sticky; top:0; z-index:50;
}
.topbar .who{display:flex; align-items:center; gap:8px; font-size:13px; color:var(--ink-soft);}

button, .btn{
  font-family:'Inter',sans-serif; font-size:13.5px; font-weight:600;
  border:1.5px solid var(--rule); background:var(--white-card); color:var(--ink);
  padding:9px 16px; border-radius:10px; cursor:pointer; transition:.15s ease;
}
button:hover{border-color:#C7CAD9; background:var(--paper-dark);}
button.primary{background:var(--maroon); color:#fff; border-color:var(--maroon);}
button.primary:hover{background:var(--maroon-dark); border-color:var(--maroon-dark);}
button.danger{border-color:#FCC; color:var(--danger); background:#FEF2F2;}
button.danger:hover{background:var(--danger); color:#fff; border-color:var(--danger);}

input, select, textarea{
  font-family:'Inter',sans-serif; font-size:14.5px; padding:10px 12px;
  border:1.5px solid var(--rule); border-radius:10px; background:var(--white-card); color:var(--ink);
}
input:focus, select:focus, textarea:focus{outline:none; border-color:var(--maroon); box-shadow:0 0 0 3px rgba(79,70,229,.14);}
label{font-size:12px; color:var(--ink-soft); display:block; margin-bottom:5px; font-weight:600;}
.field{margin-bottom:10px;}
.card{
  background:var(--white-card); border:1px solid var(--rule); border-radius:var(--radius);
  padding:18px; margin-bottom:16px; box-shadow:var(--shadow); overflow-x:auto;
}
.card h3{font-size:16px;}
.grid-stats{display:flex; flex-wrap:wrap; gap:10px;}
.stat{border-radius:14px; padding:12px 16px; background:var(--paper-dark); flex:0 0 auto;}
.stat .num{font-family:'IBM Plex Mono',monospace; font-size:21px; font-weight:700; color:var(--ink);}
.stat .lbl{font-size:11px; font-weight:600; color:var(--ink-soft); margin-top:2px;}
.lbl-icon{font-size:17px; margin-right:5px; vertical-align:-3px; display:inline-block;}
.stat-good{background:#ECFDF3;} .stat-good .num{color:#15803D;}
.stat-bad{background:#FEF2F2;} .stat-bad .num{color:#B91C1C;}
.stat-neutral{background:#EEF2FF;} .stat-neutral .num{color:#3730A3;}
.stat-info{background:#F0F9FF;} .stat-info .num{color:#0369A1;}
.stat-warning{background:#FFFBEB;} .stat-warning .num{color:#B45309;}
.stat-two{background:#ECFEFF;} .stat-two .num{color:#0E7490;}
.stat-four{background:#FEF2F2;} .stat-four .num{color:#B91C1C;}
.stat-cash{background:#FFFBEB;} .stat-cash .num{color:#B45309;}
.stat-bank{background:#EFF6FF;} .stat-bank .num{color:#1D4ED8;}
table{width:100%; border-collapse:collapse; font-size:13.5px;}
th{
  text-align:left; padding:9px 10px; white-space:nowrap;
  font-family:'Inter',sans-serif; font-size:10.5px; text-transform:uppercase; letter-spacing:.06em;
  background:var(--paper-dark); color:var(--ink-soft); font-weight:700;
}
td{padding:9px 10px; border-bottom:1px solid var(--rule);}
tr:hover td{background:var(--paper-dark);}
.v-input{color:#1D4ED8;}
.v-formula{color:var(--ink);}
.floor-1{background:#FBEAEA;} .floor-1 .contact{color:#B33A2E;}
.floor-2{background:#EAF1FB;} .floor-2 .contact{color:#1D5FA8;}
.floor-3{background:#EDF6EA;} .floor-3 .contact{color:#3E8C2E;}
.floor-4{background:#FCEFE4;} .floor-4 .contact{color:#B35A18;}
.floor-5{background:#F0EBF8;} .floor-5 .contact{color:#5D3EA8;}
.floor-6{background:#FFF8E3;} .floor-6 .contact{color:#B3860A;}
.floor-7{background:#E7F3F4;} .floor-7 .contact{color:#207E8F;}
.floor-8{background:#FBE9E9;} .floor-8 .contact{color:#B32626;}
.floor-9{background:#E9F1FA;} .floor-9 .contact{color:#1D5FA8;}
.floor-10{background:#EBF6E7;} .floor-10 .contact{color:#3E9B2E;}
.floor-11{background:#FCEEE6;} .floor-11 .contact{color:#B34B18;}
.floor-12{background:#F5E9F0;} .floor-12 .contact{color:#A82368;}
.floor-13{background:#E9F5E9;} .floor-13 .contact{color:#278A22;}
.floor-x:hover td,[class*="floor-"]:hover td{filter:brightness(0.97);}
.veh-two{background:#E7F8F8;}
.veh-four{background:#FBE9E8;}
.mobile{font-weight:700; font-size:16px; letter-spacing:.01em;}
.owner-name{font-weight:700;}
.search-safe{
  background:#ECFDF3 !important;
  border:1.5px solid var(--ledger-green) !important;
  font-weight:600;
}
.search-safe::placeholder{color:#4E9F6B;}
.search-safe-label{color:var(--ledger-green) !important; font-weight:700;}
.vnum{font-weight:700; font-size:16.5px; letter-spacing:.03em;}
.type-two{color:#0E7490; font-weight:600;}
.type-four{color:#B91C1C; font-weight:600;}
.modal-backdrop{
  position:fixed; inset:0; background:rgba(20,22,43,.5); display:flex; align-items:center; justify-content:center; z-index:1000; padding:16px;
}
.modal-box{
  background:var(--white-card); border:1px solid var(--rule); border-radius:18px; padding:22px 24px;
  max-width:360px; width:100%; box-shadow:0 12px 40px rgba(20,22,43,.25);
}
.modal-box h3{margin-bottom:10px;}
.modal-actions{display:flex; gap:10px; justify-content:flex-end; margin-top:16px;}
.tabs{

<script>
/* ============================================================
   Supabase connection, money formatting, common expense
   categories + ÷52 split calculation.

const SUPABASE_URL = "https://deyetzwxatogmdmjacvo.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRleWV0end4YXRvZ21kbWphY3ZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0MDUzNjcsImV4cCI6MjA5ODk4MTM2N30.wbdWs_Y0YvFOsQWjjodqPRuWS1H1Dx57jjb8GQtrkA0";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function fmtMoney(n){ n = Number(n||0); return '₹' + n.toLocaleString('en-IN'); }
function fmtVehicleNumber(num){
  if(!num) return '';
  const clean = num.toString().toUpperCase().replace(/\s|-/g,'');
  const m = clean.match(/^([A-Z]{2})(\d{1,2})([A-Z]{1,3})(\d{1,4})$/);
  return m ? `${m[1]}${m[2]}${m[3]} ${m[4]}` : clean;
}

/* ---- Monthly Common Expense Split ---- */
const COMMON_EXPENSE_CATEGORIES = ['Security','Housekeeping','Electricity','Water','Lift Maintenance','Repair & Maintenance','Gardening','Pest Control','Admin/Stationery'];
const TOTAL_FLATS_FIXED = 52;
let cxMonth = new Date().getMonth()+1;
let cxYear = new Date().getFullYear();

function cxMonthOptionsHtml(){
  return ['January','February','March','April','May','June','July','August','September','October','November','December']
    .map((name,i)=>`<option value="${i+1}" ${i+1===cxMonth?'selected':''}>${name}</option>`).join('');
}
function cxYearOptionsHtml(){
  const curYear = new Date().getFullYear();
  const opts = [];
  for(let y=curYear-3; y<=curYear+1; y++) opts.push(`<option value="${y}" ${y===cxYear?'selected':''}>${y}</option>`);
  return opts.join('');
}
function onCxDateChange(){
  cxMonth = Number(document.getElementById('cx_month').value);
  cxYear = Number(document.getElementById('cx_year').value);
  renderCommonExpenseSplit();
}
async function renderCommonExpenseSplit(){
  const resultBox = document.getElementById('cx_result');
  if(!resultBox) return;
  resultBox.innerHTML = 'Loading...';
  const startDate = `${cxYear}-${String(cxMonth).padStart(2,'0')}-01`;
  const endDate = cxMonth===12 ? `${cxYear+1}-01-01` : `${cxYear}-${String(cxMonth+1).padStart(2,'0')}-01`;
  const [{data:exp, error:expErr}, {data:flats, error:flatsErr}] = await Promise.all([
    sb.from('expenses').select('amount').in('category', COMMON_EXPENSE_CATEGORIES).gte('expense_date', startDate).lt('expense_date', endDate),
    sb.from('v_flats').select('status')
  ]);
  if(expErr || flatsErr){
    resultBox.innerHTML = `<div class="msg error">${(expErr||flatsErr).message}</div>`;
    return;
  }
  const total = (exp||[]).reduce((sum,e)=>sum+Number(e.amount||0),0);
  const perFlat = total / TOTAL_FLATS_FIXED;
  const soldCount = (flats||[]).filter(f=>f.status==='Sold').length;
  const unsoldCount = (flats||[]).filter(f=>f.status==='Unsold').length;
  const soldTotal = perFlat * soldCount;
  const unsoldTotal = perFlat * unsoldCount;
  resultBox.innerHTML = `
    <div class="grid-stats">
      <div class="stat stat-bad"><div class="num mono">${fmtMoney(total)}</div><div class="lbl">Month Total (Common Categories)</div></div>
      <div class="stat stat-neutral"><div class="num mono">${fmtMoney(perFlat)}</div><div class="lbl">Per Flat (÷${TOTAL_FLATS_FIXED})</div></div>
      <div class="stat stat-good"><div class="num mono">${soldCount}</div><div class="lbl">Sold Flats Count</div></div>
      <div class="stat stat-good"><div class="num mono">${fmtMoney(soldTotal)}</div><div class="lbl">Sold Flats Total</div></div>
      <div class="stat stat-warning"><div class="num mono">${unsoldCount}</div><div class="lbl">Unsold Flats Count</div></div>
      <div class="stat stat-warning"><div class="num mono">${fmtMoney(unsoldTotal)}</div><div class="lbl">Unsold Flats Total (Builder Share)</div></div>
    </div>`;
}



</script>
<script>
/* ============================================================
   ADMIN APP — PIN-gated admin panel. Everything is in this
   single file (styles + logic), nothing else to download.
   ============================================================ */
const root = document.getElementById('root');
let state = { user:null, profile:null, tab:'dashboard', msg:null };

function el(html){ const d=document.createElement('div'); d.innerHTML=html.trim(); return d.firstChild; }

/* ---------------- PIN-gated WRITE access ----------------
   Viewing (dashboard, flats, expenses, vehicle search) never
   needs a PIN — it's open to everyone, same as before.
   Only when someone tries to Add/Edit/Delete/change status,
   a PIN prompt appears. Correct PIN signs into one shared
   hidden admin account behind the scenes, unlocking writes
   ON THIS DEVICE until the "Lock" button is pressed manually. */
const HIDDEN_ADMIN_EMAIL = "cwing-admin@internal.local";
const HIDDEN_ADMIN_PASSWORD = "CwingAdmin2026";
const ADMIN_PIN = "1201";
const PIN_UNLOCK_KEY = "cwing_pin_unlocked";

function pinStillValid(){
  return localStorage.getItem(PIN_UNLOCK_KEY) === "true";
}

/* Call this from any Add/Edit/Delete/status-change handler:
     withPin(async () => { ...the actual write... });
   If already unlocked (and not expired), the action runs immediately.
   Otherwise a PIN modal appears; the action only runs after the
   correct PIN is entered and the hidden account signs in. */
async function withPin(action){
  if(pinStillValid() && state.user){ await action(); return; }
  if(state.user && !pinStillValid()){ await sb.auth.signOut(); state.user = null; }
  showPinModal(action);
}

function showPinModal(action){
  const old = document.getElementById('pin-modal');
  if(old) old.remove();
  const overlay = el(`<div class="modal-backdrop" id="pin-modal">
    <div class="modal-box">
      <h3>Enter PIN</h3>
      <p class="config-note">Needed to make changes. Stays unlocked on this device until you press Lock.</p>
      <div id="pin-modal-msg"></div>
      <input id="pin-modal-input" type="password" inputmode="numeric" maxlength="6" style="width:100%; letter-spacing:.3em; text-align:center; font-size:20px" autofocus>
      <div class="modal-actions">
        <button onclick="document.getElementById('pin-modal').remove(); refreshTab();">Cancel</button>
        <button class="primary" id="pin-modal-submit">Unlock</button>
      </div>
    </div>
  </div>`);
  document.body.appendChild(overlay);
  const submit = async ()=>{
    const pin = document.getElementById('pin-modal-input').value.trim();
    const msgBox = document.getElementById('pin-modal-msg');
    if(pin !== ADMIN_PIN){
      msgBox.innerHTML = `<div class="msg error">Wrong PIN.</div>`;
      return;
    }
    const {error} = await sb.auth.signInWithPassword({email: HIDDEN_ADMIN_EMAIL, password: HIDDEN_ADMIN_PASSWORD});
    if(error){ msgBox.innerHTML = `<div class="msg error">${error.message}</div>`; return; }
    localStorage.setItem(PIN_UNLOCK_KEY, "true");
    const {data:{session}} = await sb.auth.getSession();
    state.user = session ? session.user : null;
    overlay.remove();
    await action();
  };
  document.getElementById('pin-modal-submit').onclick = submit;
  document.getElementById('pin-modal-input').addEventListener('keydown', e=>{ if(e.key==='Enter') submit(); });
}
async function lockNow(){
  await sb.auth.signOut();
  localStorage.removeItem(PIN_UNLOCK_KEY);
  state.user = null;
  render();
}

/* Global gate: clicking/typing into ANY input box (except the two
   designated search boxes, which carry the .search-safe class)
   immediately asks for the PIN before the field can be used —
   not just when Add/Save is eventually clicked. Dropdowns
   (<select>) are left alone since choosing a value doesn't write
   anything by itself. */
document.addEventListener('focusin', (e)=>{
  const t = e.target;
  if(t.tagName === 'INPUT' && t.id !== 'pin-modal-input' && !t.classList.contains('search-safe') && !(pinStillValid() && state.user)){
    t.blur();
    showPinModal(async ()=>{ render(); });
  }
});

/* ---------------- render root — always shows the app, no view-lock ---------------- */
async function render(){
  renderAdmin();
}

/* ---------------- shared topbar ---------------- */
function topbar(title){
  const unlocked = pinStillValid() && state.user;
  return `<div class="hero-banner">
    <h1>C-Wing Society Maintenance Fund</h1>
  </div>
  <div class="topbar">
    <div class="who">${unlocked
        ? `<span class="pill sold">Unlocked</span> <button onclick="lockNow()">Lock</button>`
        : `<span class="pill unsold">View Only</span> <button class="primary" onclick="unlockOnly()">Unlock</button>`}
    </div>
  </div>`;
}
async function unlockOnly(){
  await withPin(async ()=>{ render(); });
}

/* ============================================================
   ADMIN VIEW — tabs with list + simple add form per table
   ============================================================ */
const ADMIN_TABS = [
  ['dashboard','Dashboard'],
  ['flats','Flats'],
  ['collections','Collections'],
  ['expenses','Expenses'],
  ['vehicles','Vehicles'],
  ['charges','Charges'],
  ['stickerlog','Sticker Log'],
  ['dues','Dues Summary'],
];

async function renderAdmin(){
  root.innerHTML = `<div class="app">
    ${topbar('Admin')}
    <div class="tabs">
      ${ADMIN_TABS.map(([k,label])=>`<div class="tab ${state.tab===k?'active':''}" onclick="setTab('${k}')">${label}</div>`).join('')}
    </div>
    <div id="tab-content"><div class="empty">Loading…</div></div>
  </div>`;
  renderTabContent();
}
function setTab(k){ state.tab = k; render(); }

async function renderTabContent(){
  const box = document.getElementById('tab-content');
  if(!box) return;
  try{
    if(state.tab==='dashboard') return await renderDashboardTab(box);
    if(state.tab==='flats') return await renderFlatsTab(box);
    if(state.tab==='collections') return await renderCollectionsTab(box);
    if(state.tab==='expenses') return await renderExpensesTab(box);
    if(state.tab==='vehicles') return await renderVehiclesTab(box);
    if(state.tab==='charges') return await renderChargesTab(box);
    if(state.tab==='stickerlog') return await renderStickerLogTab(box);
    if(state.tab==='dues') return await renderDuesTab(box);
  }catch(err){
    console.error(err);
    box.innerHTML = `<div class="msg error"><b>Something broke:</b> ${err.message || err}</div>`;
  }
}

/* ---- Dashboard tab ---- */

        <div class="stat stat-good"><div class="num mono">${fmtMoney(s?.total_collected)}</div><div class="lbl"><span class="lbl-icon">📥</span>Collected</div></div>
        <div class="stat stat-bad"><div class="num mono">${fmtMoney(s?.total_expense)}</div><div class="lbl"><span class="lbl-icon">📤</span>Expense</div></div>
      </div>
      <div class="grid-stats" style="margin-bottom:10px;">
        <div class="stat stat-cash"><div class="num mono">${fmtMoney(cashInHand)}</div><div class="lbl"><span class="lbl-icon">💵</span>Cash in Hand</div></div>
        <div class="stat stat-bank"><div class="num mono">${fmtMoney(bankBalance)}</div><div class="lbl"><span class="lbl-icon">🏦</span>Bank Balance</div></div>
      </div>
      <div class="grid-stats" style="margin-bottom:10px;">
        <div class="stat stat-info"><div class="num mono">${s?.total_flats??'-'}</div><div class="lbl"><span class="lbl-icon">🏢</span>Total Flats</div></div>
        <div class="stat stat-warning"><div class="num mono">${s?.unsold_flats??'-'}</div><div class="lbl"><span class="lbl-icon">🔑</span>Unsold Flats</div></div>
        <div class="stat stat-bad"><div class="num mono">${s?.flats_zero_collection??'-'}</div><div class="lbl"><span class="lbl-icon">🚫</span>Zero Collection</div></div>
      </div>
      <div class="grid-stats">
        <div class="stat stat-four"><div class="num mono type-four">${s?.total_four_wheelers??'-'}</div><div class="lbl"><span class="lbl-icon">🚗</span>4-Wheelers</div></div>
        <div class="stat stat-two"><div class="num mono type-two">${s?.total_two_wheelers??'-'}</div><div class="lbl"><span class="lbl-icon">🏍️</span>2-Wheelers</div></div>
      </div>
      <p class="config-note" style="margin-top:10px">Cash in Hand = Cash collected − Cash spent. Bank Balance = everything else (UPI/Bank Transfer/Cheque) collected − spent combined.</p>
    </div>
    <div class="card"><h3>By Payment Mode</h3>
      <table><thead><tr><th>Mode</th><th>Collected</th><th>Spent</th></tr></thead><tbody>
      ${(byMode||[]).map(m=>`<tr><td>${m.mode}</td><td class="mono stat-good" style="border:none">${fmtMoney(m.collected)}</td><td class="mono stat-bad" style="border:none">${fmtMoney(m.spent)}</td></tr>`).join('')}
      </tbody></table>
    </div>
    <div class="card"><h3>Expense by Category</h3>
      <table><thead><tr><th>Category</th><th>Amount</th></tr></thead><tbody>
      ${(byCat||[]).map(c=>`<tr><td>${c.category}</td><td class="mono">${fmtMoney(c.total_amount)}</td></tr>`).join('')}
      </tbody></table>
    </div>
    <div class="card">
      <h3>Monthly Common Expense Split</h3>
      <div class="form-row">
        <div class="field"><label>Month</label><select id="cx_month" onchange="onCxDateChange()">${cxMonthOptionsHtml()}</select></div>
        <div class="field"><label>Year</label><select id="cx_year" onchange="onCxDateChange()">${cxYearOptionsHtml()}</select></div>
      </div>
      <p class="config-note" style="margin-bottom:8px">Categories included: ${COMMON_EXPENSE_CATEGORIES.join(', ')}. Flat Expense, Event, Festival excluded. Total flats fixed at ${TOTAL_FLATS_FIXED}.</p>
      <div id="cx_result">Loading...</div>

  renderCommonExpenseSplit();

async function updateFlatStatusInline(flatNo, value){
  await withPin(async ()=>{
    const {error} = await sb.from('flats').update({status_override: value}).eq('flat_no', flatNo);
    if(error) alert(error.message);
    refreshTab();
  });
}
function editFlat(flatNo){
  const f = flatsCache.find(x=>x.flat_no===flatNo);
  if(!f) return;
  document.getElementById('f_no').value = f.flat_no;
  document.getElementById('f_floor').value = f.floor ?? '';
  document.getElementById('f_owner').value = f.owner_name || '';
  document.getElementById('f_contact').value = f.contact_no || '';
  document.getElementById('f_status').value = f.status_override || '';
  document.getElementById('f_remarks').value = f.remarks || '';
  document.getElementById('flats-form-title').textContent = `Editing Flat ${f.flat_no}`;
  document.getElementById('f_no').scrollIntoView({behavior:'smooth', block:'center'});
}
function resetFlatForm(){
  ['f_no','f_floor','f_owner','f_contact','f_remarks'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f_status').value='';
  document.getElementById('flats-form-title').textContent = 'Add / Update Flat';
}
async function upsertFlat(){
  await withPin(async ()=>{
    const payload = {
      flat_no: Number(document.getElementById('f_no').value),
      floor: document.getElementById('f_floor').value || null,
      owner_name: document.getElementById('f_owner').value || null,
      contact_no: document.getElementById('f_contact').value || null,
      status_override: document.getElementById('f_status').value || null,
      remarks: document.getElementById('f_remarks').value || null,
    };
    const {error} = await sb.from('flats').upsert(payload);
    if(error) alert(error.message); else refreshTab();
  });
}

let vehiclesCache = [];
async function renderVehiclesTab(box){
  const [{data, error}, {data:flats}] = await Promise.all([
    sb.from('v_vehicles').select('*').order('flat_no'),
    sb.from('flats').select('flat_no, owner_name').order('flat_no')
  ]);
  vehiclesCache = data || [];
  box.innerHTML = `
    <div class="card">
      <h3>Add Vehicle</h3>
      <div class="form-row">
        <div class="field"><label>Flat No</label>
          <select id="v_flat">${(flats||[]).map(f=>`<option value="${f.flat_no}">${f.flat_no}${f.owner_name?' — '+f.owner_name:''}</option>`).join('')}</select>
        </div>
        <div class="field"><label>Type</label><select id="v_type"><option>Two Wheeler</option><option>Four Wheeler</option></select></div>
        <div class="field"><label>Vehicle Number</label><input id="v_num" placeholder="GJ05XX0000"></div>
        <div class="field"><label>Remarks</label><input id="v_remarks"></div>
        <div class="field" style="flex:0"><button class="primary" onclick="addVehicle()">Add</button></div>
      </div>
      <div class="form-row">
        <div class="field"><label class="search-safe-label">🔓 Filter by Vehicle No / Flat No (open search, no PIN)</label><input id="v_search" class="search-safe" placeholder="type to filter"></div>
      </div>
      ${error?`<div class="msg error">${error.message}</div>`:''}
      <div id="vehicles-results-wrap"></div>
    </div>`;
  document.getElementById('v_search').addEventListener('input', filterVehicleResults);
  filterVehicleResults();
}
function filterVehicleResults(){
  const raw = (document.getElementById('v_search')?.value || '').trim().toUpperCase();
  const list = raw
    ? vehiclesCache.filter(v =>
        (v.vehicle_number||'').toUpperCase().includes(raw) ||
        String(v.flat_no).includes(raw))
    : vehiclesCache;
  const wrap = document.getElementById('vehicles-results-wrap');
  if(!wrap) return;
  // group by flat so the same owner/mobile isn't repeated once per vehicle
  const byFlat = {};
  list.forEach(v=>{
    if(!byFlat[v.flat_no]) byFlat[v.flat_no] = { flat_no:v.flat_no, owner_name:v.owner_name, mobile_no:v.mobile_no, vehicles:[] };
    byFlat[v.flat_no].vehicles.push(v);
  });
  const groups = Object.values(byFlat).sort((a,b)=>a.flat_no-b.flat_no);
  wrap.innerHTML = `<table><thead><tr><th>Flat</th><th>Owner</th><th>Mobile</th><th>Vehicles</th></tr></thead><tbody>
    ${groups.map(g=>`<tr class="floor-${Math.floor(g.flat_no/100)}">
      <td class="mono v-input">${g.flat_no}</td><td class="v-formula owner-name">${g.owner_name||''}</td><td class="mono mobile v-formula">${g.mobile_no||''}</td>
      <td>${g.vehicles.map(v=>`<div style="margin-bottom:4px; display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
          <span class="${v.vehicle_type==='Two Wheeler'?'type-two':'type-four'}">${v.vehicle_type}</span>
          <span class="mono vnum ${v.vehicle_type==='Two Wheeler'?'type-two':'type-four'}">${fmtVehicleNumber(v.vehicle_number)}</span>
          ${v.remarks ? `<span class="pill" style="background:#B45309; color:#fff; border-color:#B45309; font-weight:700; font-size:12.5px;">⚠ ${v.remarks}</span>` : ''}
          <span style="font-weight:700; font-size:15px; color:var(--ink-soft);">Sticker: <span style="color:${v.sticker_allotted==='Yes' ? '#2E7D4F' : '#A33A2E'};">${v.sticker_allotted}</span></span>
          <button class="danger" onclick="deleteRow('vehicles','id',${v.id})">Delete</button>
        </div>`).join('')}</td>
    </tr>`).join('') || `<tr><td colspan="4" class="empty">No vehicles found.</td></tr>`}
    </tbody></table>`;
}

/* ---- Sticker Log tab ---- */
let vehiclesByFlatCache = [];
let firstIssuedVehicles = new Set();
let lastStickerFlat = null;
async function renderStickerLogTab(box){
  const [{data, error}, {data:flats}, {data:allVehicles}, {data:firstIssued}] = await Promise.all([
    sb.from('sticker_log').select('*').order('log_date',{ascending:false}).limit(100),
    sb.from('flats').select('flat_no, owner_name').order('flat_no'),
    sb.from('vehicles').select('flat_no, vehicle_number, vehicle_type').order('flat_no'),
    sb.from('sticker_log').select('vehicle_number').eq('reason','First Issue')
  ]);
  vehiclesByFlatCache = allVehicles || [];
  firstIssuedVehicles = new Set((firstIssued||[]).map(r=>(r.vehicle_number||'').toUpperCase()));
  const vehicleTypeFor = (vnum) => {
    const v = vehiclesByFlatCache.find(x => (x.vehicle_number||'').toUpperCase() === (vnum||'').toUpperCase());
    return v ? v.vehicle_type : null;
  };
  // group entries by flat, like the Vehicles tab, so flat/date info isn't repeated per row
  const byFlat = {};
  (data||[]).forEach(s=>{
    if(!byFlat[s.flat_no]) byFlat[s.flat_no] = { flat_no:s.flat_no, entries:[] };
    byFlat[s.flat_no].entries.push(s);
  });
  const groups = Object.values(byFlat).sort((a,b)=>a.flat_no-b.flat_no);
  groups.forEach(g=> g.entries.sort((a,b)=> b.log_date.localeCompare(a.log_date)));
  box.innerHTML = `
    <div class="card">
      <h3>Add Sticker Log Entry</h3>
      <div class="form-row">
        <div class="field"><label>Date</label><input id="s_date" type="date"></div>
        <div class="field"><label>Flat No</label>
          <select id="s_flat" onchange="onStickerFlatChange()">${(flats||[]).map(f=>`<option value="${f.flat_no}">${f.flat_no}${f.owner_name?' — '+f.owner_name:''}</option>`).join('')}</select>
        </div>
        <div class="field"><label>Vehicle Number</label><select id="s_vnum" onchange="updateReasonOptions()"></select></div>
        <div class="field"><label>Reason</label>
          <select id="s_reason"></select>
        </div>
        <div class="field" style="flex:0"><button class="primary" onclick="addStickerLog()">Add</button></div>
      </div>
      ${error?`<div class="msg error">${error.message}</div>`:''}
      <table><thead><tr><th>Flat</th><th>Entries</th></tr></thead><tbody>
      ${groups.map(g=>`<tr class="floor-${Math.floor(g.flat_no/100)}">
        <td class="mono v-input">${g.flat_no}</td>
        <td>${g.entries.map(s=>{
          const t = vehicleTypeFor(s.vehicle_number);
          const typeClass = t==='Two Wheeler' ? 'type-two' : t==='Four Wheeler' ? 'type-four' : '';
          return `<div style="margin-bottom:4px; display:flex; align-items:center; gap:8px;">
            <span class="mono v-input">${s.log_date}</span>
            <span class="mono vnum ${typeClass}">${fmtVehicleNumber(s.vehicle_number)}</span>
            ${(s.reason==='Shared Pass' || (s.reason||'').startsWith('No Separate Sticker'))
              ? `<span class="pill" style="background:#B45309; color:#fff; border-color:#B45309; font-weight:700; font-size:12.5px;">⚠ ${s.reason}</span>`
              : `<span class="v-input">${s.reason||''}</span>`}
            <button class="danger" onclick="deleteRow('sticker_log','id',${s.id})">Delete</button>
          </div>`;
        }).join('')}</td>
      </tr>`).join('') || `<tr><td colspan="2" class="empty">No entries yet.</td></tr>`}
      </tbody></table>
    </div>`;
  if(lastStickerFlat && (flats||[]).some(f=>String(f.flat_no)===String(lastStickerFlat))){
    document.getElementById('s_flat').value = lastStickerFlat;
  }
  onStickerFlatChange();
}
function onStickerFlatChange(){
  const flatSel = document.getElementById('s_flat');
  const vnumSel = document.getElementById('s_vnum');
  if(!flatSel || !vnumSel) return;
  const flatNo = Number(flatSel.value);
  const matches = vehiclesByFlatCache.filter(v => v.flat_no === flatNo);
  vnumSel.innerHTML = matches.length
    ? matches.map(v=>`<option value="${v.vehicle_number}">${fmtVehicleNumber(v.vehicle_number)} — ${v.vehicle_type==='Two Wheeler'?'2-Wheeler':'4-Wheeler'}</option>`).join('')
    : `<option value="">No vehicle on record for this flat</option>`;
  updateReasonOptions();
}
function updateReasonOptions(){
  const vnumSel = document.getElementById('s_vnum');
  const reasonSel = document.getElementById('s_reason');
  if(!vnumSel || !reasonSel) return;
  const selectedVnum = (vnumSel.value||'').toUpperCase();
  const alreadyIssued = selectedVnum && firstIssuedVehicles.has(selectedVnum);
  const options = [];
  if(!alreadyIssued) options.push('First Issue');
  options.push('Replacement - Lost', 'Replacement - Damaged', 'Shared Pass', 'No Separate Sticker (Owns 2 Four Wheeler)', 'Other');
  reasonSel.innerHTML = options.map(o=>`<option>${o}</option>`).join('');
}
async function addStickerLog(){
  const vehicleNumber = document.getElementById('s_vnum').value.toUpperCase().trim();
  const reason = document.getElementById('s_reason').value || null;
  if(reason === 'First Issue' && firstIssuedVehicles.has(vehicleNumber)){
    alert('This vehicle already has a First Issue sticker on record. Pick a Replacement reason instead.');
    return;
  }
  await withPin(async ()=>{
    lastStickerFlat = document.getElementById('s_flat').value;
    const payload = {
      log_date: document.getElementById('s_date').value || new Date().toISOString().slice(0,10),
      flat_no: Number(document.getElementById('s_flat').value),
      vehicle_number: vehicleNumber,
      reason: reason,
    };
    const {error} = await sb.from('sticker_log').insert(payload);
    if(error) alert(error.message); else refreshTab();
  });
}

          ${roundNames.map(r=>`<td class="mono v-formula">${fmtMoney(f.perRound[r]||0)}</td>`).join('')}
          <td class="mono v-formula" style="font-weight:600">${fmtMoney(f.total)}</td>
        </tr>`;
      }).join('') || `<tr><td colspan="${2+roundNames.length+1}" class="empty">No charge rounds set up yet — add one in the Charges tab.</td></tr>`}
      </tbody></table>

/* ---- generic delete (with a proper styled confirm popup) ---- */
function showConfirmModal(message, onYes){
  const old = document.getElementById('confirm-modal');
  if(old) old.remove();
  const overlay = el(`<div class="modal-backdrop" id="confirm-modal">
    <div class="modal-box">
      <h3>Are you sure?</h3>
      <p>${message}</p>
      <div class="modal-actions">
        <button onclick="document.getElementById('confirm-modal').remove()">Cancel</button>
        <button class="danger" id="confirm-modal-yes">Yes, delete</button>
      </div>
    </div>
  </div>`);
  document.body.appendChild(overlay);
  document.getElementById('confirm-modal-yes').onclick = async ()=>{
    overlay.remove();
    await onYes();
  };
}
async function deleteRow(table, col, val, isString){
  await withPin(async ()=>{
    showConfirmModal('This will permanently delete this row. This cannot be undone.', async ()=>{
      const {error} = await sb.from(table).delete().eq(col, val);
      if(error) alert(error.message); else refreshTab();
    });
  });
}

(async ()=>{
  if(pinStillValid()){
    const {data:{session}} = await sb.auth.getSession();
    if(session){ state.user = session.user; }
    else { localStorage.removeItem(PIN_UNLOCK_KEY); } // stale flag, session actually gone
  }
  render();
})();
</script>
